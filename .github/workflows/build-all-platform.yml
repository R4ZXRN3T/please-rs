name: Build Multi-Architecture Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }} - ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-gnu
            script: bash scripts/build-linux.sh
          - os: Linux
            runner: ubuntu-latest
            arch: aarch64
            target: aarch64-unknown-linux-gnu
            script: bash scripts/build-linux.sh
            setup: |
              sudo apt-get update
              sudo apt-get install -y gcc-aarch64-linux-gnu
          - os: macOS
            runner: macos-latest
            arch: x86_64
            target: x86_64-apple-darwin
            script: bash scripts/build-macos.sh
          - os: macOS
            runner: macos-latest
            arch: aarch64
            target: aarch64-apple-darwin
            script: bash scripts/build-macos.sh
          - os: Windows
            runner: windows-latest
            arch: x86_64
            target: x86_64-pc-windows-msvc
            script: pwsh -ExecutionPolicy Bypass -File scripts/build-windows.ps1
          - os: Windows
            runner: windows-latest
            arch: aarch64
            target: aarch64-pc-windows-msvc
            script: pwsh -ExecutionPolicy Bypass -File scripts/build-windows.ps1

    steps:
      - uses: actions/checkout@v6

      - name: Install PowerShell
        if: runner.os == 'Windows'
        uses: PSModule/install-powershell@v1

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: ${{ matrix.target }}

      - name: Setup environment
        if: matrix.setup
        run: ${{ matrix.setup }}

      - name: Install UPX (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y upx

      - name: Build
        env:
          CARGO_BUILD_TARGET: ${{ matrix.target }}
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: ${{ matrix.script }}

      - name: Extract version
        id: extract
        shell: bash
        run: |
          VERSION=$(cargo metadata --format-version 1 | jq -r ".packages[] | select(.name==\"please-rs\") | .version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: please-${{ steps.extract.outputs.version }}-${{ matrix.os }}-${{ matrix.arch }}.zip
          path: final/please-**/please*
          compression-level: '9'
